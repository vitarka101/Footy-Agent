steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/footy-agent", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/footy-agent"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "footy-agent"
      - "--image=gcr.io/$PROJECT_ID/footy-agent"
      - "--region=us-central1"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--update-env-vars=MODEL=vertex_ai/gemini-2.5-flash-lite,DUCKDB_PATH=football_data.duckdb"
