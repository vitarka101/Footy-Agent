<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footy Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="landing-page">
    <div class="page-glow page-glow-left"></div>
    <div class="page-glow page-glow-right"></div>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <span></span>
          </div>
          <div>
            <p class="brand-kicker">GCS + DuckDB + Analyst Chat</p>
            <h1>Footy Agent</h1>
          </div>
        </div>

        <nav class="nav-pills" aria-label="Primary">
          <button class="pill pill-active" type="button">Analyst Desk</button>
          <a class="pill pill-link" href="/standings-page" target="_blank" rel="noopener noreferrer">Standings</a>
        </nav>

        <div class="status-cluster">
          <button id="refresh-data-button" class="refresh-button" type="button">Refresh Data</button>
          <div id="refresh-status-badge" class="status-note">Syncs recent matches to GCS and DuckDB</div>
          <div id="runtime-provider-pill" class="live-pill">
            <span class="live-dot"></span>
            <span>Runtime</span>
          </div>
          <div id="runtime-model-pill" class="pill pill-runtime">Model</div>
        </div>
      </header>

      <main class="landing-page-main">
        <section class="analysis-stream">
          <div class="workspace-header workspace-header-simple">
            <div class="workspace-copy">
              <p id="hero-eyebrow" class="section-kicker">Analyst desk</p>
              <h2 id="hero-title" class="workspace-title">Latest result canvas</h2>
              <p id="hero-description" class="workspace-description">
                Ask on the right. The full answer, charts, tables, and sources open here.
              </p>
            </div>
          </div>
          <div id="analysis-content" class="analysis-content analysis-content-page" aria-live="polite"></div>
        </section>
      </main>

      <aside class="chat-shell chat-rail floating-chat-shell">
        <div class="chat-rail-head">
          <div>
            <p class="section-kicker">Ask the analyst</p>
            <h3>Chat</h3>
          </div>
          <div class="tool-tag">Floating dock</div>
        </div>

        <section class="chat-examples">
          <p class="section-kicker">Example questions</p>
          <div id="prompt-chips" class="prompt-chips prompt-chips-rail"></div>
        </section>

        <div id="chat-log" class="chat-log chat-history" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="chat-label" for="chat-input">Ask the analyst</label>
          <div class="chat-input-stack">
            <textarea
              id="chat-input"
              name="message"
              rows="3"
              placeholder="Try: Analyze La Liga, compare Spain leagues, or ask about Premier League home advantage."
            ></textarea>
            <button id="send-button" class="send-button" type="submit">Run Analysis</button>
          </div>
        </form>
      </aside>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
